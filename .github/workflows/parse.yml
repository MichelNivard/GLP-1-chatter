name: Parse Reddit candidates

on:
  push:
    branches: [master, main]
    paths:
      - ".github/workflows/parse.yml"
  workflow_run:
    workflows: ["Crawl Reddit candidates", "Backfill Reddit catalog"]
    types: [completed]
  schedule:
    - cron: "42 4 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum posts/comments to parse"
        required: false
        default: "50"
      retry_errors:
        description: "Retry rows previously marked error"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

concurrency:
  group: glp1-db-${{ github.ref }}
  cancel-in-progress: false

jobs:
  parse:
    if: ${{ github.event_name != 'push' && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Initialize database
        run: python scripts/init_db.py
      - name: Parse pending candidates one item per API call
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          parse_limit="${{ github.event.inputs.limit || '50' }}"
          event_name="${{ github.event_name }}"
          source_workflow="${{ github.event.workflow_run.name || '' }}"
          if [ "$event_name" = "schedule" ]; then
            parse_limit="0"
          fi
          if [ "$event_name" = "workflow_run" ] && [ "$source_workflow" = "Backfill Reddit catalog" ]; then
            parse_limit="0"
          fi
          args=(
            --limit "$parse_limit"
            --model gpt-5.4-nano
            --rescreen-model gpt-5.4-mini
            --prompt-cache-retention 24h
          )
          echo "Parse limit: $parse_limit"
          if [ "${{ github.event.inputs.retry_errors || 'false' }}" = "true" ]; then
            args+=(--retry-errors)
          fi
          python scripts/parse_reports.py "${args[@]}"
      - name: Commit parsed database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/glp1_reports.sqlite3
          if git diff --cached --quiet; then
            echo "No parsed database changes to commit."
          else
            git commit -m "Parse Reddit GLP-1 reports"
            branch="${GITHUB_REF_NAME:-master}"
            pushed=false
            for attempt in 1 2 3; do
              git pull --rebase origin "$branch"
              if git push; then
                pushed=true
                break
              fi
              echo "Push failed on attempt $attempt; retrying after rebase."
              sleep $((attempt * 10))
            done
            if [ "$pushed" != "true" ]; then
              echo "Failed to push parsed database update after retries." >&2
              exit 1
            fi
          fi
