name: Parse Reddit candidates

on:
  push:
    branches: [master, main]
    paths:
      - ".github/workflows/parse.yml"
  workflow_run:
    workflows: ["Crawl Reddit candidates", "Backfill Reddit catalog"]
    types: [completed]
  schedule:
    - cron: "42 4 * * *"
    - cron: "17 0,6,12,18 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum posts/comments to parse"
        required: false
        default: "750"
      retry_errors:
        description: "Retry rows previously marked error"
        required: false
        default: "false"
        type: boolean
      queue_rescreen_flags:
        description: "Queue already-parsed reports that meet current rescreen thresholds"
        required: false
        default: "false"
        type: boolean
      queue_weight_gain_rescreens:
        description: "Queue positive weight-change reports for fresh mini rescreen"
        required: false
        default: "false"
        type: boolean
      weight_gain_rescreen_threshold_kg:
        description: "Minimum positive weight_change_kg to queue"
        required: false
        default: "0"

permissions:
  contents: write

concurrency:
  group: glp1-db-${{ github.ref }}
  cancel-in-progress: false

env:
  PARSE_CATCHUP_UNTIL_UTC: "2026-08-06T00:00:00Z"
  PARSE_CATCHUP_CRON: "17 0,6,12,18 * * *"
  PARSE_REGULAR_CRON: "42 4 * * *"
  PARSE_CATCHUP_LIMIT: "750"
  PARSE_REGULAR_LIMIT: "300"

jobs:
  parse:
    if: ${{ github.event_name != 'push' && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Restore database artifact
        run: python scripts/db_artifact.py unpack --if-present
      - name: Initialize database
        run: python scripts/init_db.py
      - name: Choose parse settings
        id: parse_settings
        shell: bash
        run: |
          event_name="${{ github.event_name }}"
          schedule="${{ github.event.schedule || '' }}"
          parse_limit="${{ github.event.inputs.limit || '750' }}"
          skip_parse="false"

          now_epoch="$(date -u +%s)"
          until_epoch="$(date -u -d "$PARSE_CATCHUP_UNTIL_UTC" +%s)"
          catchup_active="false"
          if [ "$now_epoch" -lt "$until_epoch" ]; then
            catchup_active="true"
          fi

          if [ "$event_name" = "schedule" ] && [ "$schedule" = "$PARSE_CATCHUP_CRON" ]; then
            if [ "$catchup_active" = "true" ]; then
              parse_limit="$PARSE_CATCHUP_LIMIT"
            else
              skip_parse="true"
            fi
          elif [ "$event_name" = "schedule" ] && [ "$schedule" = "$PARSE_REGULAR_CRON" ]; then
            if [ "$catchup_active" = "true" ]; then
              skip_parse="true"
            else
              parse_limit="$PARSE_REGULAR_LIMIT"
            fi
          elif [ "$event_name" = "workflow_run" ]; then
            if [ "$catchup_active" = "true" ]; then
              skip_parse="true"
            else
              parse_limit="$PARSE_REGULAR_LIMIT"
            fi
          fi

          echo "Catch-up active: $catchup_active"
          echo "Skip parse: $skip_parse"
          echo "Parse limit: $parse_limit"
          echo "catchup_active=$catchup_active" >> "$GITHUB_OUTPUT"
          echo "skip_parse=$skip_parse" >> "$GITHUB_OUTPUT"
          echo "parse_limit=$parse_limit" >> "$GITHUB_OUTPUT"
      - name: Parse pending candidates one item per API call
        if: ${{ steps.parse_settings.outputs.skip_parse != 'true' }}
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          parse_limit="${{ steps.parse_settings.outputs.parse_limit }}"
          args=(
            --limit "$parse_limit"
            --model gpt-5.4-nano
            --rescreen-model gpt-5.4-mini
            --prompt-cache-retention 24h
          )
          echo "Parse limit: $parse_limit"
          if [ "${{ github.event.inputs.retry_errors || 'false' }}" = "true" ]; then
            args+=(--retry-errors)
          fi
          if [ "${{ github.event.inputs.queue_rescreen_flags || 'false' }}" = "true" ]; then
            args+=(--queue-rescreen-flags)
          fi
          if [ "${{ github.event.inputs.queue_weight_gain_rescreens || 'false' }}" = "true" ]; then
            args+=(
              --queue-weight-gain-rescreens
              --force-rescreen-cache
              --rescreen-only
              --weight-gain-rescreen-threshold-kg "${{ github.event.inputs.weight_gain_rescreen_threshold_kg || '0' }}"
            )
          fi
          python scripts/parse_reports.py "${args[@]}"
      - name: Pack database artifact
        if: always()
        run: python scripts/db_artifact.py pack
      - name: Upload database recovery artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: glp1-db-parse-${{ github.run_id }}
          path: data/db-artifact/
          retention-days: 14
      - name: Commit parsed database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/db-artifact
          if git diff --cached --quiet; then
            echo "No parsed database changes to commit."
          else
            git commit -m "Parse Reddit GLP-1 reports"
            branch="${GITHUB_REF_NAME:-master}"
            pushed=false
            for attempt in 1 2 3; do
              git pull --rebase origin "$branch"
              if git push; then
                pushed=true
                break
              fi
              echo "Push failed on attempt $attempt; retrying after rebase."
              sleep $((attempt * 10))
            done
            if [ "$pushed" != "true" ]; then
              echo "Failed to push parsed database update after retries." >&2
              exit 1
            fi
          fi
