name: Build and publish Pages site

on:
  workflow_run:
    workflows: ["Parse Reddit candidates", "Screen side-effect severity"]
    types: [completed]
  push:
    branches: [master, main]
    paths:
      - "data/db-artifact/**"
      - "scripts/**"
      - "static/**"
      - "trial-data/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Restore database artifact
        run: python scripts/db_artifact.py unpack --if-present
      - name: Build static site
        run: python scripts/build_site.py
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
