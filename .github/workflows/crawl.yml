name: Crawl Reddit candidates

on:
  push:
    branches: [master, main]
    paths:
      - ".github/workflows/crawl.yml"
  schedule:
    - cron: "18 3 * * *"
  workflow_dispatch:
    inputs:
      since_days:
        description: "Recent crawl window in days"
        required: false
        default: "7"
      source:
        description: "Crawler backend: pullpush, reddit_json, or auto"
        required: false
        default: "pullpush"
      limit:
        description: "Maximum candidates to store, 0 means no explicit limit"
        required: false
        default: "0"
      seed_historical:
        description: "Run one-time historical seed instead of recent crawl"
        required: false
        default: "false"
        type: boolean
      pages:
        description: "Pages per subreddit/term/source type"
        required: false
        default: "1"
      subreddits:
        description: "Optional comma-separated subreddit allowlist"
        required: false
        default: ""
      terms:
        description: "Optional comma-separated search-term allowlist"
        required: false
        default: ""
      source_types:
        description: "Optional source types: submission,comment"
        required: false
        default: ""
      delay_seconds:
        description: "Delay between requests"
        required: false
        default: "8"
      max_combinations:
        description: "Maximum subreddit/term/source-type combinations, 0 means no cap"
        required: false
        default: "0"
      max_requests:
        description: "Maximum HTTP requests before graceful stop, 0 means no cap"
        required: false
        default: "0"
      max_minutes:
        description: "Maximum runtime before graceful stop, 0 means no cap"
        required: false
        default: "0"
      resume_checkpoints:
        description: "Resume crawl_state checkpoints: auto, true, or false"
        required: false
        default: "auto"

permissions:
  contents: write

jobs:
  crawl:
    if: ${{ github.event_name != 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Initialize database
        run: python scripts/init_db.py
      - name: Crawl Reddit candidates
        shell: bash
        run: |
          seed_historical="${{ github.event.inputs.seed_historical || 'false' }}"
          resume_checkpoints="${{ github.event.inputs.resume_checkpoints || 'auto' }}"
          args=(
            --source "${{ github.event.inputs.source || 'pullpush' }}"
            --limit "${{ github.event.inputs.limit || '0' }}"
            --pages "${{ github.event.inputs.pages || '1' }}"
            --delay-seconds "${{ github.event.inputs.delay_seconds || '8' }}"
            --max-combinations "${{ github.event.inputs.max_combinations || '0' }}"
            --max-requests "${{ github.event.inputs.max_requests || '0' }}"
            --max-minutes "${{ github.event.inputs.max_minutes || '0' }}"
          )
          if [ "${{ github.event.inputs.subreddits || '' }}" != "" ]; then
            args+=(--subreddits "${{ github.event.inputs.subreddits }}")
          fi
          if [ "${{ github.event.inputs.terms || '' }}" != "" ]; then
            args+=(--terms "${{ github.event.inputs.terms }}")
          fi
          if [ "${{ github.event.inputs.source_types || '' }}" != "" ]; then
            args+=(--source-types "${{ github.event.inputs.source_types }}")
          fi
          if [ "$seed_historical" = "true" ]; then
            args+=(--seed-historical)
          else
            args+=(--since-days "${{ github.event.inputs.since_days || '7' }}")
          fi
          if [ "$resume_checkpoints" = "true" ] || { [ "$resume_checkpoints" = "auto" ] && [ "$seed_historical" = "true" ]; }; then
            args+=(--resume-checkpoints)
          fi
          python scripts/crawl_reddit.py "${args[@]}"
      - name: Commit crawl updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/glp1_reports.sqlite3
          if git diff --cached --quiet; then
            echo "No database changes to commit."
          else
            git commit -m "Update Reddit crawl database"
            git push
          fi
